<!-- 
  SUZUKI DEALER POPUP BANNER
  =========================
  Cara penggunaan:
  1. Include popup.css di <head>
  2. Include popup.js sebelum </body>
  3. Include file ini setelah popup.js
-->

<div id="promo-popup" class="popup-overlay" role="dialog" aria-modal="true" aria-labelledby="popup-title">
  
  <div class="popup-container">
    
    <!-- Close Button -->
    <button class="popup-close" id="popup-close-btn" aria-label="Tutup popup">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    </button>

    <!-- Countdown Banner -->
    <div class="popup-countdown-banner">
      <div class="countdown-shimmer"></div>
      <span class="countdown-label">Promo Berakhir Dalam</span>
      <div class="countdown-timer" id="countdown-timer">
        <div class="time-block">
          <span class="time-value" id="countdown-days">00</span>
          <span class="time-label">Hari</span>
        </div>
        <div class="time-separator">:</div>
        <div class="time-block">
          <span class="time-value" id="countdown-hours">00</span>
          <span class="time-label">Jam</span>
        </div>
        <div class="time-separator">:</div>
        <div class="time-block">
          <span class="time-value" id="countdown-minutes">00</span>
          <span class="time-label">Menit</span>
        </div>
        <div class="time-separator">:</div>
        <div class="time-block">
          <span class="time-value" id="countdown-seconds">00</span>
          <span class="time-label">Detik</span>
        </div>
      </div>
    </div>

    <!-- Popup Content -->
    <div class="popup-content">
      
      <!-- Header Section -->
      <div class="popup-header">
        <div class="popup-badge">PENAWARAN TERBATAS</div>
        <h2 class="popup-title" id="popup-title">PROMO SUZUKI MEI 2026</h2>
        <p class="popup-subtitle">DP Ringan Mulai 15 Juta | Cicilan Mulai 2,9 Juta/Bulan</p>
      </div>

      <!-- Image Section -->
      <div class="popup-image-wrapper">
        <a href="#promo-detail" class="popup-image-link" id="popup-image-link">
          <img 
            src="images/promo-mei.jpg" 
            alt="Promo Suzuki Mei 2026 - Brosur Lengkap" 
            class="popup-image"
            id="popup-brochure-image"
            loading="lazy"
          >
          <div class="image-overlay">
            <span class="view-detail-text">Klik untuk memperbesar</span>
          </div>
        </a>
        <div class="image-glow"></div>
      </div>

      <!-- Features List -->
      <ul class="popup-features">
        <li class="feature-item">
          <svg class="feature-icon" width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/>
          </svg>
          <span>Tahun Produksi 2026</span>
        </li>
        <li class="feature-item">
          <svg class="feature-icon" width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/>
          </svg>
          <span>Garansi Resmi 3 Tahun</span>
        </li>
        <li class="feature-item">
          <svg class="feature-icon" width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/>
          </svg>
          <span>Free Service 4x</span>
        </li>
      </ul>

      <!-- CTA Buttons -->
      <div class="popup-cta">
        <a href="https://wa.me/6281234567890?text=Halo,%20saya%20tertarik%20dengan%20Promo%20Suzuki%20Mei%202026" 
           class="btn-whatsapp" 
           id="btn-whatsapp"
           target="_blank"
           rel="noopener noreferrer">
          <svg class="btn-icon" width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
            <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
          </svg>
          <span>Hubungi via WhatsApp</span>
        </a>
        <a href="#promo-detail" class="btn-detail" id="btn-detail">
          <span>Lihat Detail Promo</span>
          <svg class="btn-icon-arrow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="5" y1="12" x2="19" y2="12"></line>
            <polyline points="12 5 19 12 12 19"></polyline>
          </svg>
        </a>
      </div>

      <!-- Don't Show Again Option -->
      <label class="popup-dont-show">
        <input type="checkbox" id="dont-show-today">
        <span class="checkmark"></span>
        <span class="label-text">Jangan tampilkan lagi hari ini</span>
      </label>

    </div>
  </div>
</div>
